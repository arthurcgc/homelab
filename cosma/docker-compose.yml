services:
  cosma:
    build: .
    container_name: cosma
    ports:
      - "9102:9102"
    volumes:
      - ${HOME}/notes:/data/notes:ro
      # Symlink targets — notes may link to files in these dirs
      - ${HOME}/Documents/faye/docs:/home/samsepiol/Documents/faye/docs:ro
    restart: unless-stopped
