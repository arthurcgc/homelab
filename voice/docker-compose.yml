services:
  whisper:
    build:
      context: ./whisper
    container_name: faye-whisper
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${HOME}/Documents/faye/models/whisper:/models:ro
    ports:
      - "9100:9100"
    command:
      - "--model"
      - "/models/ggml-large-v3.bin"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9100"
      - "--convert"
      - "--language"
      - "auto"
      - "--inference-path"
      - "/v1/audio/transcriptions"
    restart: unless-stopped

  kokoro:
    build:
      context: ./kokoro
    container_name: faye-kokoro
    ports:
      - "9101:9101"
    command:
      - "--port"
      - "9101"
      - "--voice"
      - "af_heart"
    restart: unless-stopped

